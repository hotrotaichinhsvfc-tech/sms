      # ─────────────────────────────────────────
      # 7. APP ICON PLACEHOLDER (PNG tối giản để build không fail)
      # ─────────────────────────────────────────
      - name: 🖼️ Create App Icon Placeholders
        run: |
          python3 << 'EOFPY'
          import struct, zlib, os

          def make_png(w, h, rgb=(21, 101, 192)):
              def u32(n): return struct.pack('>I', n)
              def chunk(tag, data):
                  crc = zlib.crc32(tag + data) & 0xFFFFFFFF
                  return u32(len(data)) + tag + data + u32(crc)
              raw = b''.join(b'\x00' + bytes(rgb) * w for _ in range(h))
              return (b'\x89PNG\r\n\x1a\n'
                      + chunk(b'IHDR', u32(w)+u32(h)+b'\x08\x02\x00\x00\x00')
                      + chunk(b'IDAT', zlib.compress(raw))
                      + chunk(b'IEND', b''))

          densities = ['mipmap-mdpi','mipmap-hdpi','mipmap-xhdpi',
                       'mipmap-xxhdpi','mipmap-xxxhdpi']
          sizes     = [48, 72, 96, 144, 192]

          for density, size in zip(densities, sizes):
              base = f'app/src/main/res/{density}'
              os.makedirs(base, exist_ok=True)
              png = make_png(size, size)
              open(f'{base}/ic_launcher.png',       'wb').write(png)
              open(f'{base}/ic_launcher_round.png', 'wb').write(png)

          print("✅ App icons created")
          EOFPY

      # ─────────────────────────────────────────
      # 8. GRANT EXECUTE PERMISSION (an toàn — chạy lại sau khi
      #    wrapper đã được tạo ở bước Install Gradle)
      # ─────────────────────────────────────────
      - name: 📝 Grant Execute Permissions
        run: chmod +x gradlew

      # ─────────────────────────────────────────
      # FIX #8: Bỏ gradle/wrapper-validation-action
      #   (action đó validate JAR đã có sẵn trong repo,
      #    nhưng ở đây chúng ta SINH ra wrapper trong CI
      #    nên không cần validate nó với checksum bên ngoài)
      # ─────────────────────────────────────────

      # ─────────────────────────────────────────
      # 9. BUILD
      #    FIX: Bỏ -PdisablePreDex (deprecated Gradle flag)
      # ─────────────────────────────────────────
      - name: 🏗️ Build Debug APK
        run: |
          echo "🔨 Building APK..."
          ./gradlew clean assembleDebug \
            --no-daemon \
            --stacktrace \
            2>&1 | tee build.log

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -eq 0 ]; then
            echo "✅ Build successful!"
            ls -lh app/build/outputs/apk/debug/
          else
            echo "❌ Build failed!"
            tail -100 build.log
            exit 1
          fi

      - name: 🧪 Run Unit Tests
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: 🔍 Run Lint
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      # ─────────────────────────────────────────
      # 10. UPLOAD ARTIFACT
      # ─────────────────────────────────────────
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SMSMarketing-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ─────────────────────────────────────────
      # 11. SUMMARY
      # ─────────────────────────────────────────
      - name: 📋 Build Summary
        if: always()
        run: |
          echo "=========================================="
          echo "✅ BUILD WORKFLOW COMPLETED"
          echo "=========================================="
          echo "🔧 Java:    ${{ env.JAVA_VERSION }}"
          echo "🤖 SDK:     ${{ env.ANDROID_COMPILE_SDK }}"
          echo "📦 Gradle:  ${{ env.GRADLE_VERSION }}"
          echo ""
          echo "📁 Project structure:"
          find app/src/main -type d | head -25 || true
          echo ""
          echo "📦 APK output: app/build/outputs/apk/debug/app-debug.apk"
          echo "=========================================="
