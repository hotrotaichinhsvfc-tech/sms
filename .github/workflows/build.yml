      # ══════════════════════════════════════════════════
      # STEP 14 — APP ICONS (PNG hợp lệ, đúng kích thước
      #           từng density)
      # ══════════════════════════════════════════════════
      - name: 🖼️ Create App Icon Placeholders
        run: |
          python3 << 'EOFPY'
          import struct, zlib, os

          def make_png(w, h, rgb=(21, 101, 192)):
              def u32(n): return struct.pack('>I', n)
              def chunk(tag, data):
                  crc = zlib.crc32(tag + data) & 0xFFFFFFFF
                  return u32(len(data)) + tag + data + u32(crc)
              raw = b''.join(b'\x00' + bytes(rgb) * w for _ in range(h))
              return (b'\x89PNG\r\n\x1a\n'
                      + chunk(b'IHDR', u32(w)+u32(h)+b'\x08\x02\x00\x00\x00')
                      + chunk(b'IDAT', zlib.compress(raw))
                      + chunk(b'IEND', b''))

          for density, size in [
              ('mipmap-mdpi',    48), ('mipmap-hdpi',    72),
              ('mipmap-xhdpi',   96), ('mipmap-xxhdpi', 144),
              ('mipmap-xxxhdpi',192)
          ]:
              base = f'app/src/main/res/{density}'
              os.makedirs(base, exist_ok=True)
              png = make_png(size, size)
              open(f'{base}/ic_launcher.png',       'wb').write(png)
              open(f'{base}/ic_launcher_round.png', 'wb').write(png)

          print("✅ App icons created for all densities")
          EOFPY

      # ══════════════════════════════════════════════════
      # STEP 15 — VERIFY toàn bộ project
      # ══════════════════════════════════════════════════
      - name: 🔍 Verify Project Structure
        run: |
          echo "=== Root Gradle files ==="
          ls -la settings.gradle build.gradle gradle.properties local.properties
          ls -lh gradle/wrapper/
          echo ""
          echo "=== App module ==="
          ls -la app/build.gradle app/proguard-rules.pro
          echo ""
          echo "=== Kotlin sources ==="
          find app/src/main/java -name "*.kt" | sort
          echo ""
          echo "=== XML resources ==="
          find app/src/main/res -name "*.xml" | sort
          echo ""
          echo "=== Icons ==="
          find app/src/main/res -name "*.png" | sort

      # ══════════════════════════════════════════════════
      # STEP 16 — BUILD APK
      # ══════════════════════════════════════════════════
      - name: 🏗️ Build Debug APK
        run: |
          chmod +x gradlew
          echo "🔨 Building APK..."
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -eq 0 ]; then
            echo "✅ Build successful!"
            ls -lh app/build/outputs/apk/debug/
          else
            echo "❌ Build failed — last 150 lines:"
            tail -150 build.log
            exit 1
          fi

      - name: 🧪 Run Unit Tests
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: 🔍 Run Lint
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      # ══════════════════════════════════════════════════
      # STEP 17 — UPLOAD APK
      # ══════════════════════════════════════════════════
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SMSMarketing-Debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ══════════════════════════════════════════════════
      # STEP 18 — SUMMARY
      # ══════════════════════════════════════════════════
      - name: 📋 Build Summary
        if: always()
        run: |
          echo "========================================"
          echo "  BUILD WORKFLOW SUMMARY"
          echo "========================================"
          echo "  Java    : ${{ env.JAVA_VERSION }}"
          echo "  Gradle  : ${{ env.GRADLE_VERSION }}"
          echo "  SDK     : ${{ env.ANDROID_COMPILE_SDK }}"
          echo "  Min SDK : ${{ env.ANDROID_MIN_SDK }}"
          echo "  Run #   : ${{ github.run_number }}"
          echo "========================================"
          echo "  APK → app/build/outputs/apk/debug/"
          echo "========================================"
