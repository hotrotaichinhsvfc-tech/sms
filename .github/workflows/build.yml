name: 🚀 Build SMS Marketing APK - Vietnamese

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  GRADLE_VERSION: "8.4"
  JAVA_VERSION: "17"
  ANDROID_COMPILE_SDK: "34"
  ANDROID_MIN_SDK: "26"

jobs:
  prepare_and_build:
    name: 📦 Prepare Project & Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:

      # ══════════════════════════════════════════════════
      # STEP 1 — CHECKOUT
      # ══════════════════════════════════════════════════
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ══════════════════════════════════════════════════
      # STEP 2 — JAVA
      # FIX: Bỏ "cache: gradle" vì lúc này chưa có file
      # *.gradle nào trong repo → action báo "No file matched"
      # và crash ngay lập tức.
      # ══════════════════════════════════════════════════
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      # ══════════════════════════════════════════════════
      # STEP 3 — TẠO settings.gradle & build.gradle GỐC
      # FIX: Đây là bước PHẢI làm TRƯỚC "gradle wrapper".
      # Gradle yêu cầu settings.gradle tồn tại trước khi
      # có thể thực thi bất kỳ task nào kể cả "wrapper".
      # Bản cũ tạo file này SAU → "Directory does not
      # contain a Gradle build" → crash.
      # ══════════════════════════════════════════════════
      - name: ⚙️ Create Root Gradle Files
        run: |
          # ── settings.gradle ──────────────────────────
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SMSMarketing"
          include ':app'
          EOF

          # ── build.gradle (root) ───────────────────────
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
          }
          EOF

          echo "✅ Root Gradle files created:"
          ls -la *.gradle

      # ══════════════════════════════════════════════════
      # STEP 4 — TẢI GRADLE & SINH WRAPPER
      # FIX: Tải Gradle thật rồi dùng nó sinh wrapper.
      # Wrapper tự tạo đủ: gradlew + gradlew.bat +
      # gradle/wrapper/gradle-wrapper.jar (file quan trọng
      # mà bản đầu tiên bị thiếu hoàn toàn).
      # Bước này chạy SAU khi settings.gradle đã tồn tại.
      # ══════════════════════════════════════════════════
      - name: 🔧 Install Gradle & Generate Wrapper
        run: |
          set -e
          echo "⬇️  Downloading Gradle ${{ env.GRADLE_VERSION }}..."
          wget -q \
            "https://services.gradle.org/distributions/gradle-${{ env.GRADLE_VERSION }}-bin.zip" \
            -O /tmp/gradle-bin.zip
          unzip -q /tmp/gradle-bin.zip -d /tmp/gradle-dist
          GRADLE_HOME="/tmp/gradle-dist/gradle-${{ env.GRADLE_VERSION }}"

          echo "🔨 Generating Gradle wrapper..."
          "$GRADLE_HOME/bin/gradle" wrapper \
            --gradle-version="${{ env.GRADLE_VERSION }}" \
            --distribution-type=bin

          chmod +x gradlew
          echo "✅ Wrapper ready:"
          ls -lh gradle/wrapper/

      # ══════════════════════════════════════════════════
      # STEP 5 — ANDROID SDK
      # FIX: Bỏ android-actions/setup-android@v3 với tham
      # số sai. ubuntu-latest đã có Android SDK sẵn.
      # Chỉ cần sdkmanager cài thêm platform + build-tools.
      # ══════════════════════════════════════════════════
      - name: 🤖 Setup Android SDK
        run: |
          set -e
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
                --licenses > /dev/null 2>&1 || true
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" \
            "build-tools;34.0.0" \
            "platform-tools" > /dev/null 2>&1
          echo "✅ Android SDK ready (ANDROID_HOME=${ANDROID_HOME})"

      # ══════════════════════════════════════════════════
      # STEP 6 — TẠO CẤU TRÚC THƯ MỤC
      # ══════════════════════════════════════════════════
      - name: 📂 Create Directory Structure
        run: |
          set -e
          B="app/src/main/java/com/smsmarketing"
          R="app/src/main/res"

          mkdir -p "${B}/data/"{model,db,repository}
          mkdir -p "${B}/utils" "${B}/worker"
          mkdir -p "${B}/ui/"{main,import,contacts,message,settings,logs,campaign,templates,schedule}
          mkdir -p "${R}/"{values,values-vi,drawable,layout,menu,navigation}
          mkdir -p "${R}/"{mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}
          mkdir -p app/src/test/java/com/smsmarketing
          mkdir -p app/src/androidTest/java/com/smsmarketing
          echo "✅ Directories created"

      # ══════════════════════════════════════════════════
      # STEP 7 — app/build.gradle + proguard-rules.pro
      # ══════════════════════════════════════════════════
      - name: 📱 Create app/build.gradle
        run: |
          mkdir -p app
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.smsmarketing'
              compileSdk 34

              defaultConfig {
                  applicationId "com.smsmarketing"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }

              buildTypes {
                  debug {
                      debuggable true
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                              'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions { jvmTarget = '17' }

              buildFeatures { viewBinding true }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.navigation:navigation-fragment-ktx:2.7.6'
              implementation 'androidx.navigation:navigation-ui-ktx:2.7.6'
              implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
              implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.7.0'
              implementation 'androidx.room:room-runtime:2.6.1'
              implementation 'androidx.room:room-ktx:2.6.1'
              annotationProcessor 'androidx.room:room-compiler:2.6.1'
              implementation 'androidx.work:work-runtime-ktx:2.9.0'
              testImplementation 'junit:junit:4.13.2'
              androidTestImplementation 'androidx.test.ext:junit:1.1.5'
              androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
          }
          EOF

          cat > app/proguard-rules.pro << 'EOF'
          -keep class com.smsmarketing.** { *; }
          EOF
          echo "✅ app/build.gradle created"

      # ══════════════════════════════════════════════════
      # STEP 8 — gradle.properties
      # FIX: Bỏ -XX:MaxPermSize=512m (không hợp lệ Java 8+,
      # dùng Java 17 sẽ gây JVM error)
      # ══════════════════════════════════════════════════
      - name: 📋 Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          android.suppressUnsupportedCompileSdk=34
          EOF
          echo "✅ gradle.properties created"

      # ══════════════════════════════════════════════════
      # STEP 9 — local.properties
      # FIX: Dùng echo thay heredoc để $ANDROID_HOME được
      # expand đúng (single-quote heredoc không expand biến)
      # ══════════════════════════════════════════════════
      - name: 🗂️ Create local.properties
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "✅ $(cat local.properties)"

      # ══════════════════════════════════════════════════
      # STEP 10 — AndroidManifest.xml
      # FIX: + FOREGROUND_SERVICE_REMOTE_MESSAGING (API 34)
      #      + Storage permissions với maxSdkVersion đúng
      #      + READ_MEDIA_IMAGES cho API 33+
      #      + Bỏ android:debuggable (Gradle tự quản lý)
      #      + Thêm BootReceiver khai báo đầy đủ
      # ══════════════════════════════════════════════════
      - name: 🔐 Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.SEND_SMS" />
              <uses-permission android:name="android.permission.READ_SMS" />
              <uses-permission android:name="android.permission.RECEIVE_SMS" />
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.WRITE_CONTACTS" />

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="29" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_REMOTE_MESSAGING" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />

              <uses-feature android:name="android.hardware.telephony" android:required="false" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.SMSMarketing">

                  <activity
                      android:name=".ui.main.MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".worker.SmsService"
                      android:exported="false"
                      android:foregroundServiceType="remoteMessaging" />

                  <receiver android:name=".worker.SmsBroadcastReceiver" android:exported="true">
                      <intent-filter android:priority="999">
                          <action android:name="android.provider.Telephony.SMS_RECEIVED" />
                      </intent-filter>
                  </receiver>

                  <receiver android:name=".worker.BootReceiver" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>

              </application>
          </manifest>
          EOF
          echo "✅ AndroidManifest.xml created"

      # ══════════════════════════════════════════════════
      # STEP 11 — KOTLIN SOURCE FILES
      # FIX: Bản cũ không có source code → manifest và
      # nav_graph tham chiếu class không tồn tại → build fail
      # ══════════════════════════════════════════════════
      - name: 📝 Create Kotlin Source Files
        run: |
          B="app/src/main/java/com/smsmarketing"

          cat > "${B}/ui/main/MainActivity.kt" << 'EOF'
          package com.smsmarketing.ui.main

          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import androidx.navigation.fragment.NavHostFragment
          import androidx.navigation.ui.setupWithNavController
          import com.google.android.material.bottomnavigation.BottomNavigationView
          import com.smsmarketing.R

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  val nav = (supportFragmentManager
                      .findFragmentById(R.id.nav_host_fragment) as NavHostFragment)
                      .navController
                  findViewById<BottomNavigationView>(R.id.bottom_nav)
                      .setupWithNavController(nav)
              }
          }
          EOF

          cat > "${B}/ui/import/ImportFragment.kt" << 'EOF'
          package com.smsmarketing.ui.`import`

          import android.os.Bundle
          import android.view.*
          import androidx.fragment.app.Fragment

          class ImportFragment : Fragment() {
              override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  i.inflate(android.R.layout.activity_list_item, c, false)
          }
          EOF

          cat > "${B}/ui/contacts/ContactsFragment.kt" << 'EOF'
          package com.smsmarketing.ui.contacts

          import android.os.Bundle
          import android.view.*
          import androidx.fragment.app.Fragment

          class ContactsFragment : Fragment() {
              override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  i.inflate(android.R.layout.activity_list_item, c, false)
          }
          EOF

          cat > "${B}/ui/templates/TemplateFragment.kt" << 'EOF'
          package com.smsmarketing.ui.templates

          import android.os.Bundle
          import android.view.*
          import androidx.fragment.app.Fragment

          class TemplateFragment : Fragment() {
              override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  i.inflate(android.R.layout.activity_list_item, c, false)
          }
          EOF

          cat > "${B}/ui/campaign/CampaignFragment.kt" << 'EOF'
          package com.smsmarketing.ui.campaign

          import android.os.Bundle
          import android.view.*
          import androidx.fragment.app.Fragment

          class CampaignFragment : Fragment() {
              override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  i.inflate(android.R.layout.activity_list_item, c, false)
          }
          EOF

          cat > "${B}/ui/schedule/ScheduleFragment.kt" << 'EOF'
          package com.smsmarketing.ui.schedule

          import android.os.Bundle
          import android.view.*
          import androidx.fragment.app.Fragment

          class ScheduleFragment : Fragment() {
              override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  i.inflate(android.R.layout.activity_list_item, c, false)
          }
          EOF

          cat > "${B}/ui/logs/LogsFragment.kt" << 'EOF'
          package com.smsmarketing.ui.logs

          import android.os.Bundle
          import android.view.*
          import androidx.fragment.app.Fragment

          class LogsFragment : Fragment() {
              override fun onCreateView(i: LayoutInflater, c: ViewGroup?, s: Bundle?): View? =
                  i.inflate(android.R.layout.activity_list_item, c, false)
          }
          EOF

          cat > "${B}/worker/SmsService.kt" << 'EOF'
          package com.smsmarketing.worker

          import android.app.Service
          import android.content.Intent
          import android.os.IBinder

          class SmsService : Service() {
              override fun onBind(intent: Intent?): IBinder? = null
              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int) = START_NOT_STICKY
          }
          EOF

          cat > "${B}/worker/SmsBroadcastReceiver.kt" << 'EOF'
          package com.smsmarketing.worker

          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent

          class SmsBroadcastReceiver : BroadcastReceiver() {
              override fun onReceive(context: Context, intent: Intent) {}
          }
          EOF

          cat > "${B}/worker/BootReceiver.kt" << 'EOF'
          package com.smsmarketing.worker

          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent

          class BootReceiver : BroadcastReceiver() {
              override fun onReceive(context: Context, intent: Intent) {}
          }
          EOF

          echo "✅ Kotlin source files created:"
          find "${B}" -name "*.kt" | sort

      # ══════════════════════════════════════════════════
      # STEP 12 — LAYOUT XML
      # ══════════════════════════════════════════════════
      - name: 🖥️ Create Layout Files
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent">

              <androidx.fragment.app.FragmentContainerView
                  android:id="@+id/nav_host_fragment"
                  android:name="androidx.navigation.fragment.NavHostFragment"
                  android:layout_width="0dp"
                  android:layout_height="0dp"
                  app:defaultNavHost="true"
                  app:layout_constraintBottom_toTopOf="@id/bottom_nav"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toTopOf="parent"
                  app:navGraph="@navigation/nav_graph" />

              <com.google.android.material.bottomnavigation.BottomNavigationView
                  android:id="@+id/bottom_nav"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:menu="@menu/bottom_nav_menu" />

          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF
          echo "✅ Layout created"

      # ══════════════════════════════════════════════════
      # STEP 13 — RESOURCES
      # ══════════════════════════════════════════════════
      - name: 🇻🇳 Create Vietnamese Strings
        run: |
          cat > app/src/main/res/values-vi/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
