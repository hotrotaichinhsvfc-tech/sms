name: 🚀 Build SMS Marketing APK - Vietnamese

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  GRADLE_VERSION: 8.4
  JAVA_VERSION: 17
  ANDROID_SDK_VERSION: 34
  MIN_SDK_VERSION: 26

jobs:
  prepare_and_build:
    name: 📦 Prepare Project & Build APK
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔄 Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOFWRAP'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOFWRAP
          
          cat > gradlew << 'EOFGRADLEW'
          #!/bin/sh
          APP_NAME="Gradle"
          APP_HOME="$(cd "$(dirname "$0")" && pwd)"
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          exec java -cp "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          EOFGRADLEW
          chmod +x gradlew
          
          cat > gradlew.bat << 'EOFBAT'
          @echo off
          setlocal enabledelayedexpansion
          set APP_HOME=%~dp0
          set CLASSPATH=%APP_HOME%gradle\wrapper\gradle-wrapper.jar
          java -cp "%CLASSPATH%" org.gradle.wrapper.GradleWrapperMain %*
          EOFBAT
          
          echo "✅ Gradle wrapper setup complete"

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_SDK_VERSION }}
          ndk-version: r25c

      - name: 📝 Grant Execute Permissions
        run: chmod +x gradlew

      - name: 📂 Create Directory Structure
        run: |
          set -e
          BASE="app/src/main/java/com/smsmarketing"
          RES="app/src/main/res"
          
          mkdir -p $BASE/data/{model,db,repository}
          mkdir -p $BASE/utils $BASE/worker
          mkdir -p $BASE/ui/{main,import,contacts,message,settings,logs,campaign,templates,schedule}
          mkdir -p $RES/{values,values-vi,drawable,layout,menu,navigation}
          mkdir -p $RES/{mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}
          
          echo "✅ Directory structure created"

      - name: 🇻🇳 Create Vietnamese Strings
        run: |
          mkdir -p app/src/main/res/values-vi
          cat > app/src/main/res/values-vi/strings.xml << 'EOFVI'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Gửi SMS Marketing</string>
              <string name="nav_import">Nhập danh bạ</string>
              <string name="nav_contacts">Danh sách gửi</string>
              <string name="nav_campaigns">Chiến dịch</string>
              <string name="nav_templates">Mẫu tin</string>
              <string name="nav_schedule">Lịch biểu</string>
              <string name="nav_logs">Lịch sử</string>
              <string name="campaign_name_hint">Tên chiến dịch</string>
              <string name="campaign_select_contacts">Chọn danh sách gửi</string>
              <string name="campaign_select_template">Chọn mẫu tin</string>
              <string name="campaign_select_sim">Chọn SIM gửi</string>
              <string name="campaign_send_mode">Chế độ gửi</string>
              <string name="campaign_mode_normal">Gửi bình thường</string>
              <string name="campaign_mode_dual_sim">Xen kẽ 2 SIM</string>
              <string name="campaign_schedule_type">Loại lịch</string>
              <string name="campaign_now">Gửi ngay</string>
              <string name="campaign_weekly">Hàng tuần</string>
              <string name="campaign_monthly">Hàng tháng</string>
              <string name="campaign_custom">Tùy chỉnh</string>
              <string name="template_add_new">Thêm mẫu mới</string>
              <string name="template_name">Tên mẫu</string>
              <string name="template_content">Nội dung</string>
              <string name="template_variables">Biến: {name}, {phone}, {date}</string>
              <string name="btn_start_campaign">Bắt đầu chiến dịch</string>
              <string name="btn_save_template">Lưu mẫu</string>
              <string name="btn_schedule">Đặt lịch</string>
              <string name="btn_view_history">Xem lịch sử</string>
              <string name="btn_import_excel">Chọn tệp Excel</string>
              <string name="btn_select_all">Chọn tất cả</string>
              <string name="btn_deselect_all">Bỏ chọn</string>
              <string name="btn_send_selected">Gửi đã chọn</string>
              <string name="msg_campaign_created">Tạo chiến dịch thành công</string>
              <string name="msg_sending">Đang gửi...</string>
              <string name="msg_paused">Tạm dừng</string>
              <string name="msg_completed">Hoàn tất</string>
              <string name="msg_failed">Thất bại</string>
              <string name="msg_select_sim">Vui lòng chọn SIM</string>
              <string name="msg_no_contacts">Không có danh bạ. Nhập file Excel trước!</string>
              <string name="msg_no_logs">Chưa có lịch sử gửi</string>
              <string name="msg_import_success">Nhập thành công %d danh bạ</string>
              <string name="msg_import_failed">Lỗi: %s</string>
              <string name="label_delay">Thời gian chờ (giây)</string>
              <string name="label_limit">Số lượng tối đa/lần</string>
              <string name="label_total_contacts">Tổng danh bạ</string>
              <string name="label_total_sent">Tổng đã gửi</string>
              <string name="label_total_failed">Tổng thất bại</string>
              <string name="label_pending">Chờ gửi</string>
              <string name="label_status">Trạng thái</string>
              <string name="label_time">Thời gian</string>
              <string name="label_error">Lỗi</string>
              <string name="perm_sms">Quyền gửi SMS</string>
              <string name="perm_contacts">Quyền truy cập danh bạ</string>
              <string name="perm_storage">Quyền truy cập tệp</string>
          </resources>
          EOFVI

      - name: 🌐 Create English Strings
        run: |
          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/strings.xml << 'EOFENG'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">SMS Marketing</string>
              <string name="nav_import">Import Contacts</string>
              <string name="nav_contacts">Send List</string>
              <string name="nav_campaigns">Campaigns</string>
              <string name="nav_templates">Templates</string>
              <string name="nav_schedule">Schedule</string>
              <string name="nav_logs">History</string>
              <string name="campaign_name_hint">Campaign Name</string>
              <string name="campaign_select_contacts">Select Send List</string>
              <string name="campaign_select_template">Select Template</string>
              <string name="campaign_select_sim">Select SIM</string>
              <string name="campaign_send_mode">Send Mode</string>
              <string name="campaign_mode_normal">Normal Send</string>
              <string name="campaign_mode_dual_sim">Alternate 2 SIM</string>
              <string name="campaign_schedule_type">Schedule Type</string>
              <string name="campaign_now">Send Now</string>
              <string name="campaign_weekly">Weekly</string>
              <string name="campaign_monthly">Monthly</string>
              <string name="campaign_custom">Custom</string>
              <string name="template_add_new">Add New Template</string>
              <string name="template_name">Template Name</string>
              <string name="template_content">Content</string>
              <string name="template_variables">Variables: {name}, {phone}, {date}</string>
              <string name="btn_start_campaign">Start Campaign</string>
              <string name="btn_save_template">Save Template</string>
              <string name="btn_schedule">Schedule</string>
              <string name="btn_view_history">View History</string>
              <string name="btn_import_excel">Select Excel File</string>
              <string name="btn_select_all">Select All</string>
              <string name="btn_deselect_all">Deselect All</string>
              <string name="btn_send_selected">Send Selected</string>
              <string name="msg_campaign_created">Campaign created successfully</string>
              <string name="msg_sending">Sending...</string>
              <string name="msg_paused">Paused</string>
              <string name="msg_completed">Completed</string>
              <string name="msg_failed">Failed</string>
              <string name="msg_select_sim">Please select SIM</string>
              <string name="msg_no_contacts">No contacts. Import Excel first!</string>
              <string name="msg_no_logs">No send history</string>
              <string name="msg_import_success">Imported %d contacts</string>
              <string name="msg_import_failed">Error: %s</string>
              <string name="label_delay">Delay (seconds)</string>
              <string name="label_limit">Max per send</string>
              <string name="label_total_contacts">Total Contacts</string>
              <string name="label_total_sent">Total Sent</string>
              <string name="label_total_failed">Total Failed</string>
              <string name="label_pending">Pending</string>
              <string name="label_status">Status</string>
              <string name="label_time">Time</string>
              <string name="label_error">Error</string>
              <string name="perm_sms">SMS Permission</string>
              <string name="perm_contacts">Contacts Permission</string>
              <string name="perm_storage">Storage Permission</string>
          </resources>
          EOFENG

      - name: 🎨 Create Colors & Dimensions
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOFCOLORS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="white">#FFFFFFFF</color>
              <color name="black">#FF000000</color>
              <color name="colorPrimary">#1565C0</color>
              <color name="colorPrimaryDark">#0D47A1</color>
              <color name="colorAccent">#FF6F00</color>
              <color name="colorSent">#2E7D32</color>
              <color name="colorFailed">#C62828</color>
              <color name="colorBackground">#F5F5F5</color>
              <color name="colorSurface">#FFFFFF</color>
              <color name="colorOnPrimary">#FFFFFF</color>
              <color name="colorTextPrimary">#212121</color>
              <color name="colorTextSecondary">#757575</color>
              <color name="colorDivider">#E0E0E0</color>
              <color name="colorSelected">#E3F2FD</color>
          </resources>
          EOFCOLORS
          
          cat > app/src/main/res/values/dimens.xml << 'EOFDIMENS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <dimen name="margin_small">8dp</dimen>
              <dimen name="margin_medium">16dp</dimen>
              <dimen name="margin_large">24dp</dimen>
              <dimen name="text_size_small">12sp</dimen>
              <dimen name="text_size_medium">14sp</dimen>
              <dimen name="text_size_large">16sp</dimen>
              <dimen name="text_size_title">18sp</dimen>
          </resources>
          EOFDIMENS

      - name: 🎭 Create Themes
        run: |
          cat > app/src/main/res/values/themes.xml << 'EOFTHEME'
          <?xml version="1.0" encoding="utf-8"?>
          <resources xmlns:tools="http://schemas.android.com/tools">
              <style name="Theme.SMSMarketing" parent="Theme.MaterialComponents.DayNight.DarkActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryVariant">@color/colorPrimaryDark</item>
                  <item name="colorOnPrimary">@color/colorOnPrimary</item>
                  <item name="colorSecondary">@color/colorAccent</item>
                  <item name="colorOnSecondary">@color/white</item>
                  <item name="android:colorBackground">@color/colorBackground</item>
                  <item name="android:statusBarColor" tools:targetApi="l">@color/colorPrimaryDark</item>
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>
          EOFTHEME

      - name: 📋 Create Menu Files
        run: |
          cat > app/src/main/res/menu/bottom_nav_menu.xml << 'EOFMENU'
          <?xml version="1.0" encoding="utf-8"?>
          <menu xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:id="@+id/nav_import" android:icon="@android:drawable/ic_menu_upload" android:title="@string/nav_import" />
              <item android:id="@+id/nav_contacts" android:icon="@android:drawable/ic_menu_myplaces" android:title="@string/nav_contacts" />
              <item android:id="@+id/nav_templates" android:icon="@android:drawable/ic_dialog_email" android:title="@string/nav_templates" />
              <item android:id="@+id/nav_campaigns" android:icon="@android:drawable/ic_menu_recent_history" android:title="@string/nav_campaigns" />
              <item android:id="@+id/nav_schedule" android:icon="@android:drawable/ic_dialog_info" android:title="@string/nav_schedule" />
              <item android:id="@+id/nav_logs" android:icon="@android:drawable/ic_menu_recent_history" android:title="@string/nav_logs" />
          </menu>
          EOFMENU

      - name: 🗺️ Create Navigation Graph
        run: |
          cat > app/src/main/res/navigation/nav_graph.xml << 'EOFNAV'
          <?xml version="1.0" encoding="utf-8"?>
          <navigation xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:id="@+id/nav_graph"
              app:startDestination="@id/nav_import">
              <fragment android:id="@+id/nav_import" android:name="com.smsmarketing.ui.import.ImportFragment" android:label="@string/nav_import" />
              <fragment android:id="@+id/nav_contacts" android:name="com.smsmarketing.ui.contacts.ContactsFragment" android:label="@string/nav_contacts" />
              <fragment android:id="@+id/nav_templates" android:name="com.smsmarketing.ui.templates.TemplateFragment" android:label="@string/nav_templates" />
              <fragment android:id="@+id/nav_campaigns" android:name="com.smsmarketing.ui.campaign.CampaignFragment" android:label="@string/nav_campaigns" />
              <fragment android:id="@+id/nav_schedule" android:name="com.smsmarketing.ui.schedule.ScheduleFragment" android:label="@string/nav_schedule" />
              <fragment android:id="@+id/nav_logs" android:name="com.smsmarketing.ui.logs.LogsFragment" android:label="@string/nav_logs" />
          </navigation>
          EOFNAV

      - name: 🔐 Update AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOFMANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.smsmarketing">
              <uses-permission android:name="android.permission.SEND_SMS" />
              <uses-permission android:name="android.permission.READ_SMS" />
              <uses-permission android:name="android.permission.RECEIVE_SMS" />
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.WRITE_CONTACTS" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-feature android:name="android.hardware.telephony" android:required="false" />
              <application
                  android:allowBackup="true"
                  android:debuggable="false"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.SMSMarketing">
                  <activity
                      android:name=".ui.main.MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".worker.SmsService"
                      android:exported="false"
                      android:foregroundServiceType="remoteMessaging" />
                  <receiver
                      android:name=".worker.SmsBroadcastReceiver"
                      android:exported="true">
                      <intent-filter android:priority="999">
                          <action android:name="android.provider.Telephony.SMS_RECEIVED" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOFMANIFEST

      - name: ⚙️ Create Gradle Config Files
        run: |
          cat > gradle.properties << 'EOFPROPS'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxPermSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          android.suppressUnsupportedCompileSdk=34
          EOFPROPS
          
          cat > local.properties << 'EOFLOCAL'
          sdk.dir=$ANDROID_SDK_ROOT
          EOFLOCAL

      - name: ✅ Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: 🏗️ Build Debug APK
        run: |
          echo "🔨 Building APK..."
          ./gradlew clean assembleDebug -PdisablePreDex --no-daemon --stacktrace 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Build successful!"
            ls -lh app/build/outputs/apk/debug/
          else
            echo "❌ Build failed!"
            tail -100 build.log
            exit 1
          fi

      - name: 🧪 Run Unit Tests
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: 🔍 Run Lint
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SMSMarketing-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: 📋 Build Summary
        if: always()
        run: |
          echo "=========================================="
          echo "✅ BUILD WORKFLOW COMPLETED"
          echo "=========================================="
          echo "📁 Project Structure Created:"
          find app/src/main -type d | head -20 || echo "Directories created"
          echo ""
          echo "📦 APK: app/build/outputs/apk/debug/app-debug.apk"
          echo "=========================================="
