              <string name="template_name">Tên mẫu</string>
              <string name="template_content">Nội dung</string>
              <string name="template_variables">Biến: {name}, {phone}, {date}</string>
              <string name="btn_start_campaign">Bắt đầu chiến dịch</string>
              <string name="btn_save_template">Lưu mẫu</string>
              <string name="btn_schedule">Đặt lịch</string>
              <string name="btn_view_history">Xem lịch sử</string>
              <string name="btn_import_excel">Chọn tệp Excel</string>
